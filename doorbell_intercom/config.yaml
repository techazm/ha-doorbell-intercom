name: Doorbell Intercom
version: "1.0.68"
slug: doorbell_intercom
description: >-
  Universal video intercom for any Home Assistant connected doorbell.
  Live video, two-way audio, instant push notifications — works with Reolink,
  Frigate, UniFi Protect, and any camera entity in HA.
url: https://github.com/techazm/ha-doorbell-intercom
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false
ingress: true
ingress_port: 8765
ports:
  8766/tcp: 8766
ports_description:
  8766/tcp: Optional HTTPS endpoint for local microphone access
panel_icon: mdi:doorbell-video
panel_title: Doorbell Intercom
homeassistant: "2023.0.0"
homeassistant_api: true
hassio_api: true
options:
  go2rtc_url: ""
  doorbells: []
  ring_timeout: 60
  notify_target: ""
  panel_url: ""
schema:
  go2rtc_url: str?
  doorbells:
    - name: str
      doorbell_sensor: str
      camera_entity: str?
      go2rtc_stream: str?
      speaker_entity: str?
      lock_entity: str?
  ring_timeout: int
  notify_target: str?
  panel_url: str?
