name: Doorbell Intercom
version: "1.0.19"
slug: doorbell_intercom
description: >-
  Universal video intercom for any Home Assistant connected doorbell.
  Live video, two-way audio, instant push notifications — works with Reolink,
  Frigate, UniFi Protect, and any camera entity in HA.
url: https://github.com/yourusername/ha-doorbell-intercom
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false
ingress: true
ingress_port: 8765
panel_icon: mdi:doorbell-video
panel_title: Doorbell Intercom
homeassistant: "2023.0.0"
homeassistant_api: true
hassio_api: true
options:
  go2rtc_url: ""
  doorbells: []
  ring_timeout: 60
schema:
  go2rtc_url: 
    type: str
    description: "Optional. go2rtc URL for direct WebRTC streams (e.g., http://frigate:8554). Leave empty to use HA camera entities only."
  doorbells:
    type: list
    items:
      type: object
      properties:
        name:
          type: str
          description: "Display name for this doorbell"
        doorbell_sensor:
          type: str
          description: "Binary sensor entity that triggers on doorbell ring"
        camera_entity:
          type: str
          description: "HA camera entity (fallback if go2rtc_stream not available)"
        go2rtc_stream:
          type: str
          description: "Optional. go2rtc stream name for direct WebRTC (e.g., 'doorbell'). Requires go2rtc_url to be configured."
        speaker_entity:
          type: str
          description: "Optional. Speaker entity for TTS notifications"
  ring_timeout:
    type: int
    description: "Ring notification timeout in seconds"
